apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mesh-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: config
          configMap:
            name: frontend-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: mesh-demo
data:
  default.conf: |
    server {
        listen 80;
        location / {
            return 200 'Frontend OK\n';
            add_header Content-Type text/plain;
        }
        location /api {
            proxy_pass http://backend:8080;
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: mesh-demo
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mesh-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: nginx:1.25-alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: config
          configMap:
            name: backend-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: mesh-demo
data:
  default.conf: |
    server {
        listen 8080;
        location / {
            return 200 'Backend OK\n';
            add_header Content-Type text/plain;
        }
        location /data {
            proxy_pass http://database:5432;
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: mesh-demo
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: mesh-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
        - name: database
          image: nginx:1.25-alpine
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: config
          configMap:
            name: database-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: database-config
  namespace: mesh-demo
data:
  default.conf: |
    server {
        listen 5432;
        location / {
            return 200 'Database OK\n';
            add_header Content-Type text/plain;
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: mesh-demo
spec:
  selector:
    app: database
  ports:
    - port: 5432
      targetPort: 5432
