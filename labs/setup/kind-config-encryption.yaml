# kind cluster configuration - Encryption at Rest
# 1 control plane + 2 worker nodes
# Used for: Lab 06 (Secrets Management)
# Pre-configures the API server with encryption-provider-config
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
      - |
        kind: ClusterConfiguration
        apiServer:
          extraArgs:
            encryption-provider-config: /etc/kubernetes/encryption-config.yaml
          extraVolumes:
            - name: encryption-config
              hostPath: /etc/kubernetes/encryption-config.yaml
              mountPath: /etc/kubernetes/encryption-config.yaml
              readOnly: true
              pathType: File
    extraPortMappings:
      - containerPort: 30000
        hostPort: 30000
        protocol: TCP
      - containerPort: 30001
        hostPort: 30001
        protocol: TCP
    extraMounts:
      - hostPath: ./encryption-config-generated.yaml
        containerPath: /etc/kubernetes/encryption-config.yaml
        readOnly: true
  - role: worker
  - role: worker
