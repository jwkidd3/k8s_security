apiVersion: v1
kind: Pod
metadata:
  name: netbind-pod
  namespace: psa-baseline
spec:
  containers:
    - name: app
      image: nginx:alpine
      ports:
        - containerPort: 80
      securityContext:
        runAsUser: 0
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
          add:
            - NET_BIND_SERVICE
