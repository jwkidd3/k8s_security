apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: too-permissive
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: overly-permissive-binding
subjects:
  - kind: ServiceAccount
    name: default
    namespace: dev-team
roleRef:
  kind: ClusterRole
  name: too-permissive
  apiGroup: rbac.authorization.k8s.io
