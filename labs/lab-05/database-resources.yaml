apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: three-tier
  labels:
    app: database
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
      tier: database
  template:
    metadata:
      labels:
        app: database
        tier: database
    spec:
      containers:
        - name: db
          image: nginx:alpine
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-config
          configMap:
            name: database-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: three-tier
spec:
  selector:
    app: database
    tier: database
  ports:
    - port: 5432
      targetPort: 5432
